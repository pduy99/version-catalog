# Subly SDK
sublySdk = "0.0.1"

# KMP / Apple interop
skie = "0.10.12"

# Logging
kermit = "2.0.5"
slf4jSimple = "2.0.9"

# Accompanist
accompanist = "0.37.0"

# Testing
assertk = "0.25"
cucumber = "7.14.0" # Do not bump this version
espressoCore = "3.7.0"
junit = "4.13.2"
junitVersion = "1.3.0"
mockito = "5.14.2"
mockitoKotlin = "5.4.0"
turbine = "1.1.0"
