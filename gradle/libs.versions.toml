paletteKtx = "1.0.0"
room = "2.8.4"
sqliteBundled = "2.5.0-alpha11"
work = "2.11.2"

# AndroidX Hilt
androidxHilt = "1.3.0"

# Dagger Hilt
hilt = "2.59.2"

# Koin
koin = "4.2.1"
koinAnnotations = "2.0.0"

# Kotlinx
kotlinxCollectionsImmutable = "0.4.0"
kotlinxCoroutines = "1.11.0"
kotlinxDatetime = "0.6.1"
kotlinxSerialization = "1.11.0"

# Networking
ktor = "3.0.0"
okhttp = "4.12.0"

# Persistence (legacy sqldelight 1.x, kept for HeliosTranslator)
sqldelight = "1.5.4"

# Imaging / media
cameraX = "1.5.0-alpha06"
coil = "2.7.0"
lottie = "6.4.1"

# ML Kit
mlkitLanguageId = "17.0.6"
mlkitTextRecognition = "16.0.1"
