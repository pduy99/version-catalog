name: Publish to Maven Central

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: publish-maven-central
  cancel-in-progress: false

# contents: write is required to push the tag and create the GitHub release.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish and release to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Read project version
        id: version
        run: |
          VERSION=$(./gradlew -q --no-configuration-cache properties | awk -F': ' '/^version:/ {print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved project version: $VERSION"

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping tag/release creation."
          else
            # gh creates the tag at the current commit and publishes a release
            # page with auto-generated notes from commits since the last tag.
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi
